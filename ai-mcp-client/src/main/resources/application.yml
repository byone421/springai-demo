server:
  port: 8090

spring:
  main:
    allow-bean-definition-overriding: true
  ai:
    openai:
      api-key: ${qwen}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen3.5-plus
          temperature: 0.7
    mcp:
      client:
        enabled: true
        name: spring-ai-mcp-client
        version: 1.0.0
        type: ASYNC
        streamable-http:
          connections:
            streamable-mcp-server:
              url: http://localhost:8087
              endpoint: /mcp
        toolcallback:
          enabled: true
        annotation-scanner:
          enabled: true
        stdio:
          servers-configuration: classpath:/mcp-servers.json

